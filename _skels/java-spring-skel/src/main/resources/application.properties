spring.application.name=java-spring-skel
app.version=1.0.0

# Server — honour the wrapper-shared SERVICE_PORT when present so the
# multi-service wrapper can run several JVM services on different ports.
server.port=${SERVICE_PORT:8080}

# ---------------------------------------------------------------------------
# Database — wrapper-shared
# ---------------------------------------------------------------------------
# Reads the wrapper-shared environment first (SPRING_DATASOURCE_URL or
# DATABASE_JDBC_URL set by <wrapper>/.env) and falls back to in-memory H2
# when the skeleton runs stand-alone. The driver class is left to Spring
# Boot's auto-detection so the same property works for h2 / sqlite /
# postgres without re-configuration. Relative SQLite paths
# (e.g. `jdbc:sqlite:_shared/db.sqlite3`) are resolved against the
# wrapper directory at runtime by the `DataSourceConfig` bean.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_JDBC_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}

# ---------------------------------------------------------------------------
# JSON conventions
# ---------------------------------------------------------------------------
# The wrapper-shared API contract uses snake_case field names so the
# React frontend's `Item.is_completed` / `User.user_id` map directly
# onto Java's camelCase getters without per-field @JsonProperty
# annotations. Every backend service in the wrapper follows the same
# convention.
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------------------
# JWT — wrapper-shared so a token issued by any service in the wrapper is
# accepted by every other service that follows the same convention. Mapped
# onto the JwtProperties bean (app.marysia.skel.config.JwtProperties).
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:change-me-32-bytes-of-random-data}
app.jwt.algorithm=${JWT_ALGORITHM:HS256}
app.jwt.issuer=${JWT_ISSUER:devskel}
app.jwt.access-ttl=${JWT_ACCESS_TTL:3600}
app.jwt.refresh-ttl=${JWT_REFRESH_TTL:604800}

# Actuator
management.endpoints.web.exposure.include=health,info
