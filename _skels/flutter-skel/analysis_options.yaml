# Analyzer + lint configuration for the dev_skel Flutter frontend.
#
# We start from the canonical `flutter_lints` ruleset and tighten a few
# rules that catch common Flutter footguns (mutable const literals,
# stray `print()` calls, missing trailing commas in widget trees).

include: package:flutter_lints/flutter.yaml

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_literals_to_create_immutables: true
    avoid_print: true
    require_trailing_commas: true
    use_super_parameters: true
    sort_child_properties_last: true
