apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/version: '{{ .Values.image.tag }}'
    app.kubernetes.io/part-of: example-project
    app.kubernetes.io/component: server
spec:
  revisionHistoryLimit: 30
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/part-of: example-project
        app.kubernetes.io/component: pod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/version: '{{ .Values.image.tag }}'
        app.kubernetes.io/part-of: example-project
        app.kubernetes.io/component: pod
    spec:
      containers:
        - image: {{ .Values.image.repository }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: {{ .Values.name }}
          args: ["--host=0.0.0.0", "--log-config=/app/logging.ini"]
          env:
            - name: DEBUG
              value: {{ .Values.debug }}
            {{- range $k, $v := .Values.envs }}
            - name: {{ $k }}
              value: '{{ $v }}'
            {{- end }}
            - name: SUPERUSER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: exampleproject-secret
                  key: password
                  optional: true
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: "/health/readiness"
              port: 8000
            failureThreshold: {{ .Values.healtcheck.failure_threshold | default 3 }}
            initialDelaySeconds: {{ .Values.healtcheck.initial_delay_seconds | default 1 }}
            periodSeconds: {{ .Values.healtcheck.period_seconds | default 30 }}
            successThreshold: {{ .Values.healtcheck.success_rhreshold | default 1 }}
            timeoutSeconds: {{ .Values.healtcheck.timeout_econds | default 2 }}
          livenessProbe:
            httpGet:
              path: "/health/liveness"
              port: 8000
            failureThreshold: {{ .Values.healtcheck.failure_threshold | default 3 }}
            initialDelaySeconds: {{ .Values.healtcheck.initial_delay_seconds | default 1 }}
            periodSeconds: {{ .Values.healtcheck.period_seconds | default 30 }}
            successThreshold: {{ .Values.healtcheck.success_rhreshold | default 1 }}
            timeoutSeconds: {{ .Values.healtcheck.timeout_econds | default 2 }}
          startupProbe:
            httpGet:
              path: "/health/liveness"
              port: 8000
            failureThreshold: {{ .Values.healtcheck.failure_threshold | default 3 }}
            initialDelaySeconds: {{ .Values.healtcheck.startup_delay_seconds | default 30 }}
            periodSeconds: {{ .Values.healtcheck.period_seconds | default 30 }}
            successThreshold: {{ .Values.healtcheck.success_rhreshold | default 1 }}
            timeoutSeconds: {{ .Values.healtcheck.timeout_econds | default 2 }}
      imagePullSecrets:
        - name: {{ .Values.image.secret }}
      volumes:
        - name: exampleproject-tls-secret
          secret:
            secretName: {{ .Values.mtls.exampleproject_client_secret }}
