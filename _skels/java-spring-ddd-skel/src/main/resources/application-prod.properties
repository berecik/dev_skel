# Production profile
#
# Reads the wrapper-shared SPRING_DATASOURCE_URL / DATABASE_JDBC_URL and
# DATABASE_* env vars exactly like the dev profile, but defaults to a
# Postgres JDBC URL so unset config fails loudly instead of silently
# falling back to H2.

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_JDBC_URL:jdbc:postgresql://localhost:5432/devskel}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.h2.console.enabled=false
