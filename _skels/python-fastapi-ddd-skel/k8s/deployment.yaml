apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-ddd-api
  labels:
    app: fastapi-ddd-api
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fastapi-ddd-api
  template:
    metadata:
      labels:
        app: fastapi-ddd-api
        version: v1
    spec:
      containers:
        - name: api
          image: fastapi-ddd-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: PROJECT_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fastapi-ddd-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fastapi-ddd-secrets
                  key: secret-key
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/liveness
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-ddd-api
  labels:
    app: fastapi-ddd-api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: fastapi-ddd-api
---
apiVersion: v1
kind: Secret
metadata:
  name: fastapi-ddd-secrets
type: Opaque
stringData:
  database-url: "postgresql://app:app@postgres:5432/app"
  secret-key: "change-me-in-production"
