[project]
name = "django-bolt-service"
version = "0.1.0"
description = "Django-Bolt skeleton service generated by dev_skel"
requires-python = ">=3.11"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "app.settings"
python_files = ["test_*.py", "tests.py"]
testpaths = ["app/tests"]
# The skeleton ships with no migration files — tell pytest-django to build
# the test database schema directly from Model._meta. Once you generate
# real migrations (`python manage.py makemigrations app`) you can drop
# this flag to exercise them as part of the suite.
addopts = "--nomigrations"
