{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devskel.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devskel.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.credentials.user }}
  POSTGRES_PASSWORD: {{ .Values.postgres.credentials.password }}
  POSTGRES_DB: {{ .Values.postgres.credentials.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devskel.fullname" . }}-jwt
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devskel.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ .Values.jwtSecret | default "change-me-32-bytes-of-random-data" }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devskel.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devskel.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "devskel.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | default "postgres:16-alpine" }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: {{ include "devskel.fullname" . }}-postgres
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.credentials.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.credentials.user | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage | default "1Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devskel.fullname" . }}-postgres
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devskel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
{{- end }}
