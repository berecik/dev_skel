name: Maintenance Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  maintenance:
    name: Run maintenance test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-pip build-essential pkg-config libssl-dev

      - name: Install uv (Python package manager)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify dependencies
        run: |
          echo "=== Verifying installed dependencies ==="
          python3 --version
          pip3 --version || pip --version
          node --version
          npm --version
          java -version
          mvn -version
          rustc --version
          cargo --version
          uv --version || echo "uv not in path yet"

      - name: Run maintenance test suite
        run: |
          chmod +x maintenance
          ./maintenance
